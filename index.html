<!DOCTYPE html>
<html>
<head>
    <title>Mini Browser</title>
    <style>
        body {
            margin:0;
            font-family: Arial, sans-serif;
            background: #222;
            color: white;
        }
        .toolbar {
            padding: 10px;
            background: #333;
            display: flex;
            gap: 5px;
        }
        .toolbar input {
            flex: 1;
            padding: 5px;
            font-size: 16px;
        }
        .toolbar button {
            padding: 5px 10px;
            font-size: 16px;
            cursor: pointer;
        }
        #browserContainer {
            position: relative;
            width: 100%;
            height: calc(100vh - 50px);
            background: #111;
        }
        .window {
            position: absolute;
            top:50px;
            left:50px;
            width: 600px;
            height: 400px;
            border: 2px solid #555;
            background: #fff;
            display: flex;
            flex-direction: column;
        }
        .window-header {
            background: #0078d7;
            color: white;
            padding: 5px;
            display: flex;
            justify-content: space-between;
            cursor: grab;
        }
        .window iframe {
            flex: 1;
            border: none;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <input id="urlInput" placeholder="Enter URL or search term">
    <button onclick="openWindow()">Open</button>
</div>

<div id="browserContainer"></div>

<script>
let zIndexCounter = 1;
let container = document.getElementById("browserContainer");

function openWindow() {
    let input = document.getElementById("urlInput").value.trim();
    if (!input) return;

    let url = input;
    if (!url.startsWith("http://") && !url.startsWith("https://")) {
        // Use Bing search if not a full URL
        url = "https://www.bing.com/search?q=" + encodeURIComponent(input);
    }

    let win = document.createElement("div");
    win.className = "window";
    win.style.zIndex = zIndexCounter++;

    // Header with close button
    let header = document.createElement("div");
    header.className = "window-header";
    header.innerHTML = `<span>${url}</span>`;
    let closeBtn = document.createElement("button");
    closeBtn.innerText = "X";
    closeBtn.onclick = () => win.remove();
    header.appendChild(closeBtn);
    win.appendChild(header);

    // iframe
    let iframe = document.createElement("iframe");
    iframe.src = url;
    win.appendChild(iframe);

    container.appendChild(win);

    // Dragging
    let offsetX, offsetY;
    header.onmousedown = (e) => {
        offsetX = e.clientX - win.offsetLeft;
        offsetY = e.clientY - win.offsetTop;
        document.onmousemove = drag;
        document.onmouseup = stopDrag;
        win.style.zIndex = zIndexCounter++;
    };
    function drag(e) {
        win.style.left = e.clientX - offsetX + "px";
        win.style.top = e.clientY - offsetY + "px";
    }
    function stopDrag() {
        document.onmousemove = null;
        document.onmouseup = null;
    }
}
</script>

</body>
</html>
